name: React Tests

on: 
  pull_request:
    branches: 
      - main

jobs:
  test:
    runs-on: ubuntu-latest  # Only Ubuntu runner

    defaults:
      run:
        working-directory: ./betterdays/  # your project folder

    env: 
      MODE: 'dev'

    steps:
      # Step 1: Checkout repository
      - uses: actions/checkout@v3

      # Step 2: Setup Node.js (latest stable)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'  # picks the latest LTS version

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Run tests
      - name: Run tests
        run: npm test -- --watchAll=false